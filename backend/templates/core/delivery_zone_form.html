{% extends 'core/base.html' %}

{% block title %}{{ title }} - Alpha LPGas{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <h1><i class="bi bi-geo-alt"></i> {{ title }}</h1>
    </div>
    <div class="col-md-6 text-end">
        <a href="{% url 'accounting_forms:delivery_zone_list' %}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Zone Name *</label>
                    <input type="text" name="name" class="form-control" value="{{ zone.name|default:'' }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Delivery Fee *</label>
                    <input type="number" name="delivery_fee" class="form-control" step="0.01" value="{{ zone.delivery_fee|default:'0.00' }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Estimated Time</label>
                    <input type="text" name="estimated_time" class="form-control" placeholder="e.g. 30-60 min" value="{{ zone.estimated_time|default:'' }}">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label">Postal Codes</label>
                    <textarea name="postal_codes" class="form-control" rows="2" placeholder="Comma-separated postal codes">{{ zone.postal_codes|default:'' }}</textarea>
                </div>
            </div>
            <div class="mb-3">
                <div class="form-check">
                    <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if zone.is_active or not zone %}checked{% endif %}>
                    <label class="form-check-label" for="is_active">Active</label>
                </div>
            </div>
            <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'accounting_forms:delivery_zone_list' %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
