{% extends 'core/base.html' %}

{% block title %}Delete Delivery Zone - Alpha LPGas{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <h1><i class="bi bi-trash"></i> Delete Delivery Zone</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <p>Are you sure you want to delete the delivery zone <strong>{{ zone.name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <a href="{% url 'accounting_forms:delivery_zone_list' %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-danger">Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
